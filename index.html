<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Motiva</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  </head>
  <body>
    <script>
      // Defensive: run as early as possible to prevent the browser from restoring scroll
      try {
        if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
      } catch (e) {}
      try { window.scrollTo(0,0); document.documentElement.scrollTop = 0; } catch (e) {}
    </script>
    <div id="root"></div>
    <!-- Vite entry - let the build generate correct asset links -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
