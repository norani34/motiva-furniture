<html lang="en">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Motiva</title>
    <link rel="icon" href="/motiva-furniture/favicon.svg" type="image/svg+xml">
    <script type="module" crossorigin src="/motiva-furniture/assets/index-BLcfOZOH.js"></script>
    <link rel="stylesheet" crossorigin href="/motiva-furniture/assets/index-DkXk5xdB.css">
  </head>
  <body>
    <script>
      // Defensive: run as early as possible to prevent the browser from restoring scroll
      try {
        if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
      } catch (e) {}

      (function forceTop() {
        try {
          // temporarily disable smooth scrolling to avoid animated jumps
          document.documentElement.style.scrollBehavior = 'auto';
          document.body.style.scrollBehavior = 'auto';
        } catch (e) {}

        function scrollTop() {
          try {
            window.scrollTo({ top: 0, left: 0, behavior: 'auto' });
            document.documentElement.scrollTop = 0;
            document.body.scrollTop = 0;
          } catch (e) {}
        }

        // immediate attempt
        scrollTop();

        // multiple RAFs and a load listener to counter late layout/hydration shifts
        for (let i = 0; i < 5; i++) requestAnimationFrame(scrollTop);
        window.addEventListener('load', scrollTop, { once: true });

        // restore any preferred scroll behaviour shortly after load
        try {
          setTimeout(() => {
            try {
              document.documentElement.style.scrollBehavior = '';
              document.body.style.scrollBehavior = '';
            } catch (e) {}
          }, 500);
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <!-- Vite entry - let the build generate correct asset links -->
  </body>
</html>
